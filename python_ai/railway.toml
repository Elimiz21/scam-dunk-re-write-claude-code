[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Use the readiness-aware /health endpoint so a permanently-failed pipeline is
# reported as 503 (unhealthy) rather than "/" always returning 200.
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
