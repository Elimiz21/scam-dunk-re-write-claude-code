<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Define gradient -->
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B4A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF9F1C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M 128 20 L 200 60 L 200 140 C 200 200 128 236 128 236 C 128 236 56 200 56 140 L 56 60 Z" 
        fill="url(#faviconGradient)" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Checkmark inside shield -->
  <g transform="translate(128, 128) scale(0.7)">
    <!-- Left part of checkmark -->
    <line x1="-30" y1="0" x2="-10" y2="20" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <!-- Right part of checkmark -->
    <line x1="-10" y1="20" x2="30" y2="-20" stroke="white" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
