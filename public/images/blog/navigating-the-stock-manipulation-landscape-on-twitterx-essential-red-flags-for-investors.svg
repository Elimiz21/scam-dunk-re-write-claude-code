<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111318;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="200" r="180" fill="#1d9bf0" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="800" cy="500" r="160" fill="#ef4444" opacity="0.04" filter="url(#softglow)"/>

  <!-- X/Twitter feed mockup (right side) -->
  <g transform="translate(620, 60)">
    <!-- Feed container -->
    <rect x="40" y="10" width="490" height="520" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="270" y="40" font-family="system-ui,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" font-weight="600">X / TWITTER FEED</text>

    <!-- Tweet 1 - suspicious -->
    <rect x="55" y="55" width="460" height="100" rx="10" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="80" cy="85" r="16" fill="#ef4444" fill-opacity="0.2"/>
    <text x="80" y="90" font-family="system-ui,sans-serif" font-size="10" fill="#f87171" text-anchor="middle" font-weight="700">🤖</text>
    <text x="104" y="79" font-family="system-ui,sans-serif" font-size="11" fill="#e5e7eb" font-weight="700">StockAlerts_Real</text>
    <text x="104" y="93" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">@alerts_real99 · Account age: 3 days</text>
    <text x="65" y="112" font-family="system-ui,sans-serif" font-size="12" fill="#fca5a5">🚀 $XYZC about to EXPLODE. Loading up now.</text>
    <text x="65" y="128" font-family="system-ui,sans-serif" font-size="12" fill="#fca5a5">This is the one. Don't miss it. RT for signal! 🔥🔥</text>
    <text x="65" y="146" font-family="system-ui,sans-serif" font-size="10" fill="#4b5563">❤ 2.4k  🔁 891  💬 44  · 🚩 New acct · No bio · Coordinated RT</text>

    <!-- Tweet 2 -->
    <rect x="55" y="165" width="460" height="90" rx="10" fill="#f97316" fill-opacity="0.05" stroke="#f97316" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="80" cy="193" r="16" fill="#f97316" fill-opacity="0.15"/>
    <text x="80" y="198" font-family="system-ui,sans-serif" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="700">💰</text>
    <text x="104" y="187" font-family="system-ui,sans-serif" font-size="11" fill="#e5e7eb" font-weight="700">WallStreetWhisper</text>
    <text x="104" y="201" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">@wswhisper · 142 followers · joined yesterday</text>
    <text x="65" y="218" font-family="system-ui,sans-serif" font-size="12" fill="#fdba74">"My source at the company says earnings will beat. $XYZC."</text>
    <text x="65" y="244" font-family="system-ui,sans-serif" font-size="10" fill="#4b5563">❤ 567  🔁 234  · 🚩 Insider claim · No verification · Illegal tip</text>

    <!-- Tweet 3 - mass identical -->
    <rect x="55" y="265" width="460" height="80" rx="10" fill="#8b5cf6" fill-opacity="0.05" stroke="#8b5cf6" stroke-opacity="0.1" stroke-width="1"/>
    <text x="104" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#e5e7eb" font-weight="700">CryptoTradingPro88</text>
    <text x="104" y="302" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">+ 12 other accounts posting identical content</text>
    <text x="65" y="320" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd">$XYZC is criminally undervalued. Target: $4.50. Load up! 🚀</text>
    <text x="65" y="336" font-family="system-ui,sans-serif" font-size="10" fill="#4b5563">🚩 Coordinated · Identical text across 13 accounts · Bot behavior</text>

    <!-- Red flag summary -->
    <rect x="55" y="358" width="460" height="160" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <text x="75" y="382" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af" font-weight="700">RED FLAGS DETECTED IN THIS FEED</text>
    <g font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">
      <text x="75" y="402">🚩  New accounts (0–7 days old) promoting same ticker</text>
      <text x="75" y="420">🚩  Coordinated retweet patterns within minutes</text>
      <text x="75" y="438">🚩  Claimed insider information (securities law violation)</text>
      <text x="75" y="456">🚩  Identical copy-pasted text across multiple accounts</text>
      <text x="75" y="474">🚩  Engagement metrics disproportionate to follower count</text>
      <text x="75" y="492">🚩  Price targets with no supporting analysis</text>
      <text x="75" y="510">🚩  Urgent "load up / don't miss" language</text>
    </g>
  </g>

  <!-- Left content -->
  <rect x="64" y="180" width="4" height="280" rx="2" fill="url(#brand)"/>
  <rect x="80" y="172" width="72" height="72" rx="16" fill="url(#brand)" filter="url(#glow)"/>
  <!-- X logo simplified -->
  <g transform="translate(116,208)">
    <line x1="-14" y1="-16" x2="14" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="-16" x2="-14" y2="16" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  <rect x="80" y="264" width="148" height="26" rx="13" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="154" y="281" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle" letter-spacing="1">SECURITY TIPS</text>
  <text x="80" y="340" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">Twitter/X Stock</text>
  <text x="80" y="390" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">Manipulation</text>
  <text x="80" y="432" font-family="system-ui,sans-serif" font-size="18" fill="#9ca3af">Coordinated pump schemes · Bot networks · Red flags</text>
  <g transform="translate(80,466)">
    <rect width="130" height="36" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">ScamDunk</text>
  </g>
  <g transform="translate(80,516)">
    <rect width="116" height="22" rx="11" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="58" y="15" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">Security Tips</text>
  </g>
</svg>
