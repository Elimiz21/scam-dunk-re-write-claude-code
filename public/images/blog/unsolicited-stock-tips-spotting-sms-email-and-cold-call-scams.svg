<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1014;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1420;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
  
    <!-- BG 3 Gradients -->
    <linearGradient id="bg-new" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141210;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1c1a17;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="mesh-1" cx="25%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#F57C00;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mesh-2" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#2A9D8F;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mesh-3" cx="50%" cy="75%" r="50%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0"/>
    </radialGradient>
    <!-- Brand Square Gradients -->
    <linearGradient id="square-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B4A;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#FF9F1C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="green-dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1"/>
    </radialGradient>
    <!-- Filters -->
    <filter id="square-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-new)"/>
  <rect width="1200" height="630" fill="url(#mesh-1)"/>
  <rect width="1200" height="630" fill="url(#mesh-2)"/>
  <rect width="1200" height="630" fill="url(#mesh-3)"/>

  <circle cx="950" cy="300" r="200" fill="#ef4444" opacity="0.05" filter="url(#softglow)"/>

  <!-- Decorative: incoming message bubbles (right side) -->
  <g transform="translate(620, 80)" opacity="0.75">
    <!-- SMS bubble 1 (spam) -->
    <rect x="60" y="20" width="460" height="70" rx="14" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="60" y="20" width="5" height="70" rx="2" fill="#ef4444" opacity="0.4"/>
    <text x="80" y="42" font-family="system-ui,sans-serif" font-size="10" fill="#918b87">📱 SMS · Unknown +1 (888) 555-0192</text>
    <text x="80" y="60" font-family="system-ui,sans-serif" font-size="12" fill="#f87171" font-weight="600">"ALERT: XYZC going to 10x — buy NOW before market open!"</text>
    <text x="80" y="78" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">🚩 Unsolicited · Urgency · Unknown sender</text>

    <!-- Email bubble -->
    <rect x="60" y="110" width="460" height="80" rx="14" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="60" y="110" width="5" height="80" rx="2" fill="#f97316" opacity="0.4"/>
    <text x="80" y="132" font-family="system-ui,sans-serif" font-size="10" fill="#918b87">✉️ Email · From: hotpicks@free-alerts.net</text>
    <text x="80" y="150" font-family="system-ui,sans-serif" font-size="12" fill="#fb923c" font-weight="600">"Guaranteed 300% Return — Insider Pick This Week Only"</text>
    <text x="80" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">"This is not financial advice." · Contains affiliate link</text>
    <text x="80" y="182" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">🚩 Guaranteed returns · Spam domain · Urgency</text>

    <!-- Cold call transcript -->
    <rect x="60" y="210" width="460" height="110" rx="14" fill="#8b5cf6" fill-opacity="0.05" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="60" y="210" width="5" height="110" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <text x="80" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#918b87">📞 Cold Call · Recorded transcript excerpt</text>
    <text x="80" y="252" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa">"I'm calling from Prestige Capital Group — we have a private placement..."</text>
    <text x="80" y="270" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa">"Our clients are already seeing 200% returns this quarter..."</text>
    <text x="80" y="288" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa">"This offer expires tonight. Shall I take down your wire details?"</text>
    <text x="80" y="308" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">🚩 Fake credentials · Urgency · Wire request</text>

    <!-- Pattern labels -->
    <rect x="60" y="340" width="460" height="50" rx="10" fill="#ebe9e5" fill-opacity="0.02" stroke="#ebe9e5" stroke-opacity="0.05" stroke-width="1"/>
    <text x="80" y="362" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" font-weight="600">COMMON PATTERN ACROSS ALL 3 VECTORS:</text>
    <text x="80" y="380" font-family="system-ui,sans-serif" font-size="11" fill="#918b87">Unsolicited · Urgency · Guaranteed returns · Unknown promoter · Buy NOW</text>
  </g>

  <!-- Left content -->
  <rect x="64" y="180" width="4" height="280" rx="2" fill="url(#square-grad)"/>
  
  <!-- New Option C Icon Container -->
  <g transform="translate(80, 168)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#square-grad)" opacity="0.3" filter="url(#square-glow)"/>
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#square-grad)"/>
  </g>
  <g transform="translate(160, 248)" filter="url(#dot-glow)">
    <circle cx="0" cy="0" r="14" fill="#141210" stroke="#141210" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="url(#green-dot)"/>
    <circle cx="-2" cy="-2" r="3" fill="#ebe9e5" opacity="0.6"/>
  </g>

  <!-- Phone/alert icon -->
  <g transform="translate(116,208)">
    <rect x="-10" y="-18" width="20" height="32" rx="4" stroke="#ebe9e5" stroke-width="2.5" fill="none"/>
    <circle cx="0" cy="10" r="2" fill="#ebe9e5"/>
    <line x1="-4" y1="-6" x2="4" y2="-6" stroke="#ebe9e5" stroke-width="2" stroke-linecap="round"/>
  </g>
  <rect x="80" y="264" width="148" height="26" rx="13" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="154" y="281" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle" letter-spacing="1">SECURITY TIPS</text>
  <text x="80" y="338" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#ebe9e5" letter-spacing="-1">Unsolicited</text>
  <text x="80" y="388" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#ebe9e5" letter-spacing="-1">Stock Tips</text>
  <text x="80" y="432" font-family="system-ui,sans-serif" font-size="18" fill="#918b87">SMS · Email · Cold Call scam identification</text>
  <g transform="translate(80,466)">
    <rect width="130" height="36" rx="8" fill="#ebe9e5" fill-opacity="0.06" stroke="#ebe9e5" stroke-opacity="0.1" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FF9F1C" text-anchor="middle"   >ScamDunk</text>
  </g>
  <g transform="translate(80,516)">
    <rect width="116" height="22" rx="11" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="58" y="15" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">Security Tips</text>
  </g>
</svg>
