<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0f18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#141520;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="scan-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="1000" cy="180" r="200" fill="#10b981" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="850" cy="480" r="200" fill="#f97316" opacity="0.04" filter="url(#softglow)"/>

  <!-- Magnifying glass decorative element (background, right side) -->
  <g transform="translate(820, 100)" opacity="0.07">
    <!-- Lens circle -->
    <circle cx="150" cy="150" r="120" stroke="white" stroke-width="8" fill="none"/>
    <!-- Handle -->
    <line x1="240" y1="240" x2="330" y2="330" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <!-- Inner scan lines -->
    <line x1="75" y1="100" x2="225" y2="100" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="130" x2="240" y2="130" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="55" y1="160" x2="245" y2="160" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="190" x2="240" y2="190" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="75" y1="220" x2="225" y2="220" stroke="white" stroke-width="2" opacity="0.5"/>
    <!-- Target reticle in lens -->
    <circle cx="150" cy="155" r="30" stroke="#10b981" stroke-width="2" fill="none" opacity="5"/>
    <line x1="150" y1="115" x2="150" y2="135" stroke="#10b981" stroke-width="2" opacity="5"/>
    <line x1="150" y1="175" x2="150" y2="195" stroke="#10b981" stroke-width="2" opacity="5"/>
    <line x1="110" y1="155" x2="130" y2="155" stroke="#10b981" stroke-width="2" opacity="5"/>
    <line x1="170" y1="155" x2="190" y2="155" stroke="#10b981" stroke-width="2" opacity="5"/>
  </g>

  <!-- Scan line animation effect (static representation) -->
  <rect x="820" y="238" width="300" height="2" rx="1" fill="#10b981" opacity="0.15" filter="url(#scan-glow)"/>

  <!-- Step indicators (right side, subtle) -->
  <g transform="translate(680, 150)" opacity="0.35">
    <!-- Step 1 -->
    <circle cx="40" cy="60" r="20" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <text x="40" y="65" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">1</text>
    <line x1="40" y1="80" x2="40" y2="120" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Step 2 -->
    <circle cx="40" cy="140" r="20" fill="none" stroke="#f97316" stroke-width="1.5"/>
    <text x="40" y="145" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">2</text>
    <line x1="40" y1="160" x2="40" y2="200" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Step 3 -->
    <circle cx="40" cy="220" r="20" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="40" y="225" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">3</text>
    <line x1="40" y1="240" x2="40" y2="280" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Step 4 -->
    <circle cx="40" cy="300" r="20" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="40" y="305" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#8b5cf6" text-anchor="middle">4</text>
    <line x1="40" y1="320" x2="40" y2="360" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Step 5 -->
    <circle cx="40" cy="380" r="20" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <text x="40" y="385" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">5</text>

    <!-- Step labels -->
    <text x="75" y="65" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af" dominant-baseline="middle">Company fundamentals</text>
    <text x="75" y="145" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af" dominant-baseline="middle">Trading patterns</text>
    <text x="75" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af" dominant-baseline="middle">Promotional activity</text>
    <text x="75" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af" dominant-baseline="middle">Regulatory status</text>
    <text x="75" y="385" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af" dominant-baseline="middle">Analytical tools</text>
  </g>

  <!-- Left accent bar -->
  <rect x="64" y="180" width="4" height="280" rx="2" fill="url(#brand)"/>

  <!-- Icon container: magnifying glass / search icon -->
  <rect x="80" y="172" width="72" height="72" rx="16" fill="url(#brand)" filter="url(#glow)"/>
  <!-- Search icon -->
  <g transform="translate(116, 208)">
    <circle cx="-4" cy="-5" r="13" stroke="white" stroke-width="2.5" fill="none"/>
    <line x1="6" y1="5" x2="16" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Category label -->
  <rect x="80" y="264" width="162" height="26" rx="13" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4" stroke-width="1"/>
  <text x="161" y="281" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#10b981" text-anchor="middle" letter-spacing="1">DETECTION GUIDE</text>

  <!-- Main title -->
  <text x="80" y="342" font-family="Georgia, serif" font-size="50" font-weight="700" fill="#ffffff" letter-spacing="-1">How to Detect</text>
  <text x="80" y="408" font-family="Georgia, serif" font-size="50" font-weight="700" fill="#ffffff" letter-spacing="-1">Stock Scams</text>

  <!-- Subtitle -->
  <text x="80" y="454" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#9ca3af" font-weight="400">5-step framework · Red flags · Manipulation patterns</text>

  <!-- ScamDunk brand tag -->
  <g transform="translate(80, 490)">
    <rect width="130" height="36" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="0.5">ScamDunk</text>
  </g>

  <!-- Checkmark badges -->
  <g transform="translate(80, 543)">
    <rect width="100" height="22" rx="11" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="50" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#34d399" text-anchor="middle">✓ Free Analysis</text>
  </g>
  <g transform="translate(190, 543)">
    <rect width="112" height="22" rx="11" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="56" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#fb923c" text-anchor="middle">🚩 Red Flag Check</text>
  </g>
</svg>
