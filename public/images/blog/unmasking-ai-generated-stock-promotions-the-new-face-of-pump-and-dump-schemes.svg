<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10121c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="aiglow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="200" r="220" fill="#8b5cf6" opacity="0.05" filter="url(#softglow)"/>
  <circle cx="700" cy="500" r="160" fill="#ef4444" opacity="0.04" filter="url(#softglow)"/>

  <!-- AI neural network / generation visualization (right side) -->
  <g transform="translate(620, 50)">
    <text x="270" y="28" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="600" letter-spacing="1">AI-GENERATED PROMOTION FLOW</text>

    <!-- AI generator box -->
    <rect x="160" y="44" width="200" height="80" rx="14" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1.5" filter="url(#aiglow)"/>
    <text x="260" y="76" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle" font-weight="700">🤖 AI Content Engine</text>
    <text x="260" y="94" font-family="system-ui,sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">GPT-4 · Automated · $0.003/post</text>
    <text x="260" y="110" font-family="system-ui,sans-serif" font-size="9" fill="#7c3aed" text-anchor="middle">Generates 1,000s of unique articles/day</text>

    <!-- Arrow down -->
    <line x1="260" y1="124" x2="260" y2="154" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <polygon points="260,158 254,148 266,148" fill="#8b5cf6" opacity="0.5"/>

    <!-- Outputs: 3 channels -->
    <rect x="30" y="162" width="150" height="80" rx="10" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
    <text x="105" y="186" font-family="system-ui,sans-serif" font-size="10" fill="#f87171" text-anchor="middle" font-weight="700">📰 Fake News Sites</text>
    <text x="105" y="202" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">stoeckmarkettoday.net</text>
    <text x="105" y="216" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">AI-written, SEO-optimized</text>
    <text x="105" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">500 new articles/day</text>

    <rect x="185" y="162" width="150" height="80" rx="10" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.15" stroke-width="1"/>
    <text x="260" y="186" font-family="system-ui,sans-serif" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="700">🐦 Social Media</text>
    <text x="260" y="202" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Thousands of bot accounts</text>
    <text x="260" y="216" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Twitter · Reddit · StockTwits</text>
    <text x="260" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Human-like writing style</text>

    <rect x="340" y="162" width="150" height="80" rx="10" fill="#2ca5e0" fill-opacity="0.05" stroke="#2ca5e0" stroke-opacity="0.15" stroke-width="1"/>
    <text x="415" y="186" font-family="system-ui,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" font-weight="700">📧 Email Blasts</text>
    <text x="415" y="202" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Personalized by AI</text>
    <text x="415" y="216" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Bypasses spam filters</text>
    <text x="415" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">10M recipients/campaign</text>

    <!-- Arrows from AI to channels -->
    <line x1="220" y1="145" x2="105" y2="162" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="260" y1="158" x2="260" y2="162" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="300" y1="145" x2="415" y2="162" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

    <!-- How to detect AI-generated content -->
    <rect x="30" y="260" width="460" height="180" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <text x="50" y="282" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af" font-weight="700">HOW TO DETECT AI-GENERATED STOCK PROMOTIONS</text>

    <g font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">
      <text x="50" y="304">🔴  Unnaturally perfect grammar with no editorial voice</text>
      <text x="50" y="322">🔴  Vague superlatives: "exceptional growth potential" with no data</text>
      <text x="50" y="340">🔴  Author bio doesn't exist on LinkedIn, no byline history</text>
      <text x="50" y="358">🔴  Published simultaneously on 20+ identical-looking sites</text>
      <text x="50" y="376">🔴  No disclosure of who paid for the promotion (SEC required)</text>
      <text x="50" y="394">✅  Use AI detectors: GPTZero, Copyleaks — then cross-check SEC filings</text>
      <text x="50" y="412">✅  Search the company name + "paid promotion" or "stock promotion"</text>
    </g>
  </g>

  <!-- Left content -->
  <rect x="64" y="180" width="4" height="280" rx="2" fill="url(#brand)"/>
  <rect x="80" y="172" width="72" height="72" rx="16" fill="url(#ai-grad)" filter="url(#glow)"/>
  <!-- AI brain/circuit icon -->
  <g transform="translate(116,208)">
    <circle cx="0" cy="-4" r="12" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="0" cy="-4" r="5" fill="white" opacity="0.5"/>
    <line x1="0" y1="8" x2="0" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="12" x2="8" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-12" y1="-4" x2="-20" y2="-4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="-4" x2="20" y2="-4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <rect x="80" y="264" width="148" height="26" rx="13" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="154" y="281" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing="1">SECURITY TIPS</text>
  <text x="80" y="342" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">AI-Generated</text>
  <text x="80" y="390" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">Stock Promotions</text>
  <text x="80" y="430" font-family="system-ui,sans-serif" font-size="17" fill="#9ca3af">The new face of pump-and-dump: scaled by AI</text>
  <g transform="translate(80,460)">
    <rect width="130" height="36" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">ScamDunk</text>
  </g>
  <g transform="translate(80,510)">
    <rect width="116" height="22" rx="11" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="58" y="15" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">Security Tips</text>
  </g>
</svg>
