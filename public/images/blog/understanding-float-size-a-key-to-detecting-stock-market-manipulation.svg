<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1014;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161820;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lever-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
  
    <!-- BG 3 Gradients -->
    <linearGradient id="bg-new" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141210;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1c1a17;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="mesh-1" cx="25%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#F57C00;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mesh-2" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#2A9D8F;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mesh-3" cx="50%" cy="75%" r="50%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0"/>
    </radialGradient>
    <!-- Brand Square Gradients -->
    <linearGradient id="square-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B4A;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#FF9F1C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="green-dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1"/>
    </radialGradient>
    <!-- Filters -->
    <filter id="square-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-new)"/>
  <rect width="1200" height="630" fill="url(#mesh-1)"/>
  <rect width="1200" height="630" fill="url(#mesh-2)"/>
  <rect width="1200" height="630" fill="url(#mesh-3)"/>

  <circle cx="920" cy="300" r="200" fill="#f97316" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="700" cy="150" r="140" fill="#3b82f6" opacity="0.03" filter="url(#softglow)"/>

  <!-- Float lever diagram (right side) -->
  <g transform="translate(620, 60)">
    <!-- Title -->
    <text x="270" y="32" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="600" letter-spacing="1">FLOAT SIZE → PRICE IMPACT</text>

    <!-- Small float scenario -->
    <rect x="30" y="50" width="220" height="200" rx="12" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
    <text x="140" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#f87171" text-anchor="middle" font-weight="700">SMALL FLOAT</text>
    <text x="140" y="90" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">500K – 2M shares</text>

    <!-- Lever diagram: small float = big movement -->
    <!-- Fulcrum -->
    <polygon points="140,210 126,240 154,240" fill="#4b5563"/>
    <!-- Lever arm (tilted up sharply) -->
    <line x1="60" y1="195" x2="220" y2="145" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Small weight (buy pressure) -->
    <circle cx="68" cy="193" r="10" fill="#3b82f6" fill-opacity="0.6"/>
    <text x="68" y="197" font-family="system-ui,sans-serif" font-size="8" fill="#ebe9e5" text-anchor="middle">BUY</text>
    <!-- Big price arrow up -->
    <line x1="212" y1="148" x2="212" y2="100" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="4,3" opacity="0.6"/>
    <polygon points="212,92 206,108 218,108" fill="#ef4444" opacity="0.8"/>
    <text x="212" y="86" font-family="system-ui,sans-serif" font-size="10" fill="#f87171" text-anchor="middle" font-weight="700">+180%</text>
    <text x="140" y="228" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Small buy = HUGE move</text>

    <!-- Large float scenario -->
    <rect x="290" y="50" width="220" height="200" rx="12" fill="#10b981" fill-opacity="0.04" stroke="#10b981" stroke-opacity="0.12" stroke-width="1"/>
    <text x="400" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="700">LARGE FLOAT</text>
    <text x="400" y="90" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">50M+ shares</text>

    <!-- Lever diagram: large float = small movement -->
    <polygon points="400,210 386,240 414,240" fill="#4b5563"/>
    <!-- Lever arm (nearly flat) -->
    <line x1="320" y1="185" x2="480" y2="178" stroke="#10b981" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <!-- Large weight to push -->
    <circle cx="328" cy="183" r="18" fill="#3b82f6" fill-opacity="0.4"/>
    <text x="328" y="187" font-family="system-ui,sans-serif" font-size="8" fill="#ebe9e5" text-anchor="middle">BUY</text>
    <!-- Small price arrow -->
    <line x1="472" y1="180" x2="472" y2="155" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3" opacity="0.5"/>
    <polygon points="472,148 467,162 477,162" fill="#10b981" opacity="0.5"/>
    <text x="472" y="143" font-family="system-ui,sans-serif" font-size="10" fill="#34d399" text-anchor="middle" font-weight="700">+3%</text>
    <text x="400" y="228" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Same buy = small move</text>

    <!-- Key metrics box -->
    <rect x="30" y="270" width="480" height="130" rx="10" fill="#ebe9e5" fill-opacity="0.02" stroke="#ebe9e5" stroke-opacity="0.05" stroke-width="1"/>
    <text x="50" y="292" font-family="system-ui,sans-serif" font-size="10" fill="#918b87" font-weight="700">WHAT FLOAT SIZE REVEALS</text>
    <g font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">
      <text x="50" y="314">🔴  Float &lt; 5M shares → High manipulation risk, price easily moved</text>
      <text x="50" y="334">🟡  Float 5M–20M → Moderate risk, watch for coordinated buying</text>
      <text x="50" y="354">🟢  Float &gt; 50M → Lower risk, requires institutional-scale buying</text>
      <text x="50" y="374">📊  Float + Volume spike together = strongest manipulation signal</text>
    </g>
  </g>

  <!-- Left content -->
  <rect x="64" y="180" width="4" height="280" rx="2" fill="url(#square-grad)"/>
  
  <!-- New Option C Icon Container -->
  <g transform="translate(80, 168)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#square-grad)" opacity="0.3" filter="url(#square-glow)"/>
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#square-grad)"/>
  </g>
  <g transform="translate(160, 248)" filter="url(#dot-glow)">
    <circle cx="0" cy="0" r="14" fill="#141210" stroke="#141210" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="url(#green-dot)"/>
    <circle cx="-2" cy="-2" r="3" fill="#ebe9e5" opacity="0.6"/>
  </g>

  <!-- Float icon: bar chart with lever -->
  <g transform="translate(116,208)">
    <rect x="-14" y="4" width="8" height="14" rx="1" fill="#ebe9e5" opacity="0.9"/>
    <rect x="-3" y="-4" width="8" height="22" rx="1" fill="#ebe9e5"/>
    <rect x="8" y="-12" width="8" height="30" rx="1" fill="#ebe9e5" opacity="0.7"/>
    <line x1="-18" y1="18" x2="20" y2="18" stroke="#ebe9e5" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <rect x="80" y="264" width="136" height="26" rx="13" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="148" y="281" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle" letter-spacing="1">DETECTION GUIDE</text>
  <text x="80" y="342" font-family="Georgia,serif" font-size="44" font-weight="700" fill="#ebe9e5" letter-spacing="-1">Float Size &amp;</text>
  <text x="80" y="394" font-family="Georgia,serif" font-size="44" font-weight="700" fill="#ebe9e5" letter-spacing="-1">Manipulation</text>
  <text x="80" y="436" font-family="system-ui,sans-serif" font-size="17" fill="#918b87">Why small floats are a scammer's best friend</text>
  <g transform="translate(80,466)">
    <rect width="130" height="36" rx="8" fill="#ebe9e5" fill-opacity="0.06" stroke="#ebe9e5" stroke-opacity="0.1" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FF9F1C" text-anchor="middle"   >ScamDunk</text>
  </g>
  <g transform="translate(80,516)">
    <rect width="104" height="22" rx="11" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="52" y="15" font-family="system-ui,sans-serif" font-size="11" fill="#fb923c" text-anchor="middle">Detection Guide</text>
  </g>
</svg>
