<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1016;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#131620;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="45"/></filter>
  
    <!-- BG 3 Gradients -->
    <linearGradient id="bg-new" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141210;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1c1a17;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="mesh-1" cx="25%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#F57C00;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mesh-2" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#2A9D8F;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mesh-3" cx="50%" cy="75%" r="50%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0"/>
    </radialGradient>
    <!-- Brand Square Gradients -->
    <linearGradient id="square-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B4A;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#FF9F1C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2A9D8F;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="green-dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1"/>
    </radialGradient>
    <!-- Filters -->
    <filter id="square-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-new)"/>
  <rect width="1200" height="630" fill="url(#mesh-1)"/>
  <rect width="1200" height="630" fill="url(#mesh-2)"/>
  <rect width="1200" height="630" fill="url(#mesh-3)"/>

  <circle cx="940" cy="300" r="220" fill="#f97316" opacity="0.03" filter="url(#softglow)"/>
  <circle cx="700" cy="580" r="160" fill="#8b5cf6" opacity="0.03" filter="url(#softglow)"/>

  <!-- Right side: Forensic investigation framework -->
  <g transform="translate(616, 48)">
    <text x="270" y="26" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="600" letter-spacing="1">FORENSIC PENNY STOCK CHECKLIST</text>

    <!-- Section 1: Company -->
    <rect x="20" y="38" width="530" height="22" rx="5" fill="#ebe9e5" fill-opacity="0.04" stroke="#ebe9e5" stroke-opacity="0.06" stroke-width="1"/>
    <text x="32" y="53" font-family="system-ui,sans-serif" font-size="9" fill="#918b87" font-weight="700" letter-spacing="0.5">① COMPANY FUNDAMENTALS</text>
    <!-- Items -->
    <g font-family="system-ui,sans-serif" font-size="10">
      <rect x="20" y="62" width="530" height="20" fill="#ef4444" fill-opacity="0.04"/>
      <text x="36" y="76" fill="#f87171">🔴</text>
      <text x="54" y="76" fill="#d1d5db">No audited financial statements or auditor with &lt;5 clients</text>
      <rect x="484" y="65" width="56" height="14" rx="3" fill="#ef4444" fill-opacity="0.2"/>
      <text x="512" y="76" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">HIGH RISK</text>

      <rect x="20" y="84" width="530" height="20" fill="#ef4444" fill-opacity="0.03"/>
      <text x="36" y="98" fill="#f87171">🔴</text>
      <text x="54" y="98" fill="#d1d5db">$0 revenue + "going concern" note in annual 10-K filing</text>
      <rect x="484" y="87" width="56" height="14" rx="3" fill="#ef4444" fill-opacity="0.2"/>
      <text x="512" y="98" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">HIGH RISK</text>

      <rect x="20" y="106" width="530" height="20" fill="#f97316" fill-opacity="0.03"/>
      <text x="36" y="120" fill="#fb923c">🟠</text>
      <text x="54" y="120" fill="#d1d5db">Business registered &lt;18 months ago with recent name change</text>
      <rect x="484" y="109" width="56" height="14" rx="3" fill="#f97316" fill-opacity="0.15"/>
      <text x="512" y="120" font-size="8" fill="#fb923c" text-anchor="middle" font-weight="700">CAUTION</text>
    </g>

    <!-- Section 2: Share structure -->
    <rect x="20" y="132" width="530" height="22" rx="5" fill="#ebe9e5" fill-opacity="0.04" stroke="#ebe9e5" stroke-opacity="0.06" stroke-width="1"/>
    <text x="32" y="147" font-family="system-ui,sans-serif" font-size="9" fill="#918b87" font-weight="700" letter-spacing="0.5">② SHARE STRUCTURE &amp; FLOAT</text>
    <g font-family="system-ui,sans-serif" font-size="10">
      <rect x="20" y="156" width="530" height="20" fill="#ef4444" fill-opacity="0.04"/>
      <text x="36" y="170" fill="#f87171">🔴</text>
      <text x="54" y="170" fill="#d1d5db">Float below 2M shares — tiny float = massive volatility potential</text>
      <rect x="484" y="159" width="56" height="14" rx="3" fill="#ef4444" fill-opacity="0.2"/>
      <text x="512" y="170" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">HIGH RISK</text>

      <rect x="20" y="178" width="530" height="20" fill="#ef4444" fill-opacity="0.03"/>
      <text x="36" y="192" fill="#f87171">🔴</text>
      <text x="54" y="192" fill="#d1d5db">Recent S-1 with no insider lock-up period — insiders can sell immediately</text>
      <rect x="484" y="181" width="56" height="14" rx="3" fill="#ef4444" fill-opacity="0.2"/>
      <text x="512" y="192" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">HIGH RISK</text>

      <rect x="20" y="200" width="530" height="20" fill="#f97316" fill-opacity="0.03"/>
      <text x="36" y="214" fill="#fb923c">🟠</text>
      <text x="54" y="214" fill="#d1d5db">Authorized shares drastically higher than outstanding (dilution risk)</text>
      <rect x="484" y="203" width="56" height="14" rx="3" fill="#f97316" fill-opacity="0.15"/>
      <text x="512" y="214" font-size="8" fill="#fb923c" text-anchor="middle" font-weight="700">CAUTION</text>
    </g>

    <!-- Section 3: Promotion signals -->
    <rect x="20" y="226" width="530" height="22" rx="5" fill="#ebe9e5" fill-opacity="0.04" stroke="#ebe9e5" stroke-opacity="0.06" stroke-width="1"/>
    <text x="32" y="241" font-family="system-ui,sans-serif" font-size="9" fill="#918b87" font-weight="700" letter-spacing="0.5">③ PROMOTION &amp; TRADING SIGNALS</text>
    <g font-family="system-ui,sans-serif" font-size="10">
      <rect x="20" y="250" width="530" height="20" fill="#ef4444" fill-opacity="0.04"/>
      <text x="36" y="264" fill="#f87171">🔴</text>
      <text x="54" y="264" fill="#d1d5db">Volume spike 5× or more above 20-day average with no news catalyst</text>
      <rect x="484" y="253" width="56" height="14" rx="3" fill="#ef4444" fill-opacity="0.2"/>
      <text x="512" y="264" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">HIGH RISK</text>

      <rect x="20" y="272" width="530" height="20" fill="#ef4444" fill-opacity="0.03"/>
      <text x="36" y="286" fill="#f87171">🔴</text>
      <text x="54" y="286" fill="#d1d5db">Paid newsletter promotion — "sponsored" disclaimer in fine print</text>
      <rect x="484" y="275" width="56" height="14" rx="3" fill="#ef4444" fill-opacity="0.2"/>
      <text x="512" y="286" font-size="8" fill="#f87171" text-anchor="middle" font-weight="700">HIGH RISK</text>

      <rect x="20" y="294" width="530" height="20" fill="#f97316" fill-opacity="0.03"/>
      <text x="36" y="308" fill="#fb923c">🟠</text>
      <text x="54" y="308" fill="#d1d5db">Price up 30%+ within 72hrs with sudden social media buzz spike</text>
      <rect x="484" y="297" width="56" height="14" rx="3" fill="#f97316" fill-opacity="0.15"/>
      <text x="512" y="308" font-size="8" fill="#fb923c" text-anchor="middle" font-weight="700">CAUTION</text>
    </g>

    <!-- Verdict -->
    <rect x="20" y="326" width="530" height="50" rx="10" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
    <text x="285" y="347" font-family="system-ui,sans-serif" font-size="10" fill="#f87171" text-anchor="middle" font-weight="700">FORENSIC VERDICT GUIDE</text>
    <text x="285" y="364" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">3+ RED flags = avoid entirely   ·   1–2 RED = extreme caution   ·   ORANGE only = verify before acting</text>

    <!-- Tools row -->
    <rect x="20" y="386" width="530" height="66" rx="10" fill="#ebe9e5" fill-opacity="0.02" stroke="#ebe9e5" stroke-opacity="0.04" stroke-width="1"/>
    <text x="40" y="406" font-family="system-ui,sans-serif" font-size="9" fill="#918b87" font-weight="700">FREE FORENSIC TOOLS</text>
    <g font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">
      <text x="40" y="424">📋  SEC EDGAR (efts.sec.gov) — 10-K, S-1, Form 4, 8-K filings</text>
      <text x="40" y="440">📊  OTC Markets (otcmarkets.com) — float, share structure, tier status</text>
      <text x="40" y="456">🔍  ScamDunk.com — automated multi-signal risk scanning, free</text>
    </g>
  </g>

  <!-- Left content -->
  <rect x="64" y="180" width="4" height="280" rx="2" fill="url(#square-grad)"/>
  
  <!-- New Option C Icon Container -->
  <g transform="translate(80, 168)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#square-grad)" opacity="0.3" filter="url(#square-glow)"/>
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#square-grad)"/>
  </g>
  <g transform="translate(160, 248)" filter="url(#dot-glow)">
    <circle cx="0" cy="0" r="14" fill="#141210" stroke="#141210" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="url(#green-dot)"/>
    <circle cx="-2" cy="-2" r="3" fill="#ebe9e5" opacity="0.6"/>
  </g>

  <!-- Magnifying glass / forensic icon -->
  <g transform="translate(116,208)">
    <circle cx="0" cy="-4" r="12" stroke="#ebe9e5" stroke-width="2.5" fill="none" opacity="0.9"/>
    <line x1="9" y1="6" x2="16" y2="14" stroke="#ebe9e5" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-3" cy="-6" r="4" fill="#ebe9e5" fill-opacity="0.15"/>
  </g>
  <rect x="80" y="264" width="148" height="26" rx="13" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="154" y="281" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle" letter-spacing="1">INVESTOR GUIDE</text>
  <text x="80" y="342" font-family="Georgia,serif" font-size="44" font-weight="700" fill="#ebe9e5" letter-spacing="-1">Penny Stock</text>
  <text x="80" y="394" font-family="Georgia,serif" font-size="44" font-weight="700" fill="#ebe9e5" letter-spacing="-1">Forensics</text>
  <text x="80" y="436" font-family="system-ui,sans-serif" font-size="17" fill="#918b87">How to investigate a ticker before it investigates you</text>
  <g transform="translate(80,466)">
    <rect width="130" height="36" rx="8" fill="#ebe9e5" fill-opacity="0.06" stroke="#ebe9e5" stroke-opacity="0.1" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FF9F1C" text-anchor="middle"   >ScamDunk</text>
  </g>
  <g transform="translate(80,516)">
    <rect width="104" height="22" rx="11" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="52" y="15" font-family="system-ui,sans-serif" font-size="11" fill="#fb923c" text-anchor="middle">Investor Guide</text>
  </g>
</svg>
