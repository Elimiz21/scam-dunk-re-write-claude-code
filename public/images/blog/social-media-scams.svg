<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#13141f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blue-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="950" cy="200" r="220" fill="#3b82f6" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="700" cy="500" r="180" fill="#f97316" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="100" cy="100" r="120" fill="#6366f1" opacity="0.04" filter="url(#softglow)"/>

  <!-- Network/connection lines (social network metaphor) -->
  <g stroke="#4ade80" stroke-opacity="0.06" stroke-width="1" fill="none">
    <!-- Nodes connected by lines -->
    <line x1="750" y1="120" x2="900" y2="200"/>
    <line x1="900" y1="200" x2="1050" y2="150"/>
    <line x1="900" y1="200" x2="950" y2="350"/>
    <line x1="950" y1="350" x2="1100" y2="400"/>
    <line x1="950" y1="350" x2="800" y2="420"/>
    <line x1="800" y1="420" x2="750" y2="550"/>
    <line x1="750" y1="120" x2="650" y2="230"/>
    <line x1="650" y1="230" x2="750" y2="350"/>
    <line x1="750" y1="350" x2="950" y2="350"/>
    <line x1="1050" y1="150" x2="1150" y2="280"/>
    <line x1="1150" y1="280" x2="1100" y2="400"/>
    <!-- Danger lines in red -->
    <line x1="900" y1="200" x2="950" y2="350" stroke="#ef4444" stroke-opacity="0.12"/>
    <line x1="750" y1="350" x2="800" y2="420" stroke="#ef4444" stroke-opacity="0.1"/>
  </g>

  <!-- Network nodes -->
  <g>
    <!-- Main bad actor node -->
    <circle cx="900" cy="200" r="16" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="900" cy="200" r="6" fill="#ef4444" opacity="0.6"/>

    <!-- Victim nodes -->
    <circle cx="750" cy="120" r="10" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="750" cy="120" r="4" fill="#9ca3af" opacity="0.4"/>

    <circle cx="1050" cy="150" r="10" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="1050" cy="150" r="4" fill="#9ca3af" opacity="0.4"/>

    <circle cx="950" cy="350" r="12" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="950" cy="350" r="5" fill="#f97316" opacity="0.5"/>

    <circle cx="1100" cy="400" r="10" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="1100" cy="400" r="4" fill="#9ca3af" opacity="0.4"/>

    <circle cx="800" cy="420" r="10" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="800" cy="420" r="4" fill="#9ca3af" opacity="0.4"/>

    <circle cx="1150" cy="280" r="8" fill="#9ca3af" fill-opacity="0.1" stroke="#9ca3af" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="1150" cy="280" r="3" fill="#9ca3af" opacity="0.3"/>

    <circle cx="650" cy="230" r="8" fill="#9ca3af" fill-opacity="0.1" stroke="#9ca3af" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="650" cy="230" r="3" fill="#9ca3af" opacity="0.3"/>

    <circle cx="750" cy="350" r="8" fill="#9ca3af" fill-opacity="0.1" stroke="#9ca3af" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="750" cy="350" r="3" fill="#9ca3af" opacity="0.3"/>

    <circle cx="750" cy="550" r="8" fill="#9ca3af" fill-opacity="0.08" stroke="#9ca3af" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="750" cy="550" r="3" fill="#9ca3af" opacity="0.25"/>
  </g>

  <!-- Platform labels near nodes (very faded) -->
  <text x="890" y="185" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" opacity="0.4" text-anchor="middle">SCAMMER</text>
  <text x="745" y="107" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af" opacity="0.4" text-anchor="middle">TELEGRAM</text>
  <text x="1050" y="136" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af" opacity="0.4" text-anchor="middle">DISCORD</text>
  <text x="952" y="370" font-family="system-ui, sans-serif" font-size="9" fill="#f97316" opacity="0.4" text-anchor="middle">REDDIT</text>

  <!-- Left accent bar -->
  <rect x="64" y="180" width="4" height="280" rx="2" fill="url(#brand)"/>

  <!-- Icon container: chat bubble icon -->
  <rect x="80" y="172" width="72" height="72" rx="16" fill="url(#brand)" filter="url(#glow)"/>
  <!-- Chat bubble -->
  <g transform="translate(116, 208)">
    <rect x="-18" y="-18" width="36" height="28" rx="6" stroke="white" stroke-width="2.5" fill="none"/>
    <polygon points="-10,10 -4,18 4,10" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <circle cx="-7" cy="-4" r="2.5" fill="white"/>
    <circle cx="0" cy="-4" r="2.5" fill="white"/>
    <circle cx="7" cy="-4" r="2.5" fill="white"/>
  </g>

  <!-- Category label -->
  <rect x="80" y="264" width="160" height="26" rx="13" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="160" y="281" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle" letter-spacing="1">AWARENESS GUIDE</text>

  <!-- Main title -->
  <text x="80" y="342" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Social Media</text>
  <text x="80" y="408" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Investment Scams</text>

  <!-- Subtitle -->
  <text x="80" y="454" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#9ca3af" font-weight="400">Telegram · Discord · Reddit pump-and-dump coordination</text>

  <!-- ScamDunk brand tag -->
  <g transform="translate(80, 490)">
    <rect width="130" height="36" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="0.5">ScamDunk</text>
  </g>

  <!-- Platform pill badges -->
  <g transform="translate(80, 543)">
    <rect width="88" height="22" rx="11" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="44" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">Telegram</text>
  </g>
  <g transform="translate(178, 543)">
    <rect width="80" height="22" rx="11" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="40" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">Discord</text>
  </g>
  <g transform="translate(268, 543)">
    <rect width="72" height="22" rx="11" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="36" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#fb923c" text-anchor="middle">Reddit</text>
  </g>
</svg>
